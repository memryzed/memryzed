# Memryzed configuration.
# See docs/configuration.md for the full reference.
#
# This file is generated by `memryzed init` on first run.
# Edit it freely. Run `memryzed config edit` to open it in $EDITOR.

[general]
log_level = "info"

[server]
rate_limit_recall_per_minute = 60
rate_limit_remember_per_minute = 30
rate_limit_other_per_minute = 60

[memory]
auto_approve_threshold = 0.85
default_ttl_days = 0
pinned_count_limit = 0

[retrieval]
max_results = 10
vector_weight = 0.6
fts_weight = 0.3
recency_weight = 0.1
embedding_model = "bge-small-en-v1.5"

[extractor]
enabled = true
rule_based = true
ollama_enabled = false
ollama_url = "http://localhost:11434"
ollama_model = "qwen2.5:3b"

[updates]
check_on_startup = true
auto_install = false

[telemetry]
enabled = false
