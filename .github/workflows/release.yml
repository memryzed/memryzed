name: Release

# Builds release artifacts for every supported target, verifies each
# one, attaches them to a GitHub Release, and signs them with build
# provenance. Triggered by pushing a version tag.
#
# Security model: this workflow has NO access to AWS or any deploy
# credential. It only produces artifacts and publishes a GitHub
# Release. Promoting a release to memryzed.com (the install endpoint)
# is a manual step performed from a trusted machine, see
# docs/development/release-process.md. A compromised CI run therefore
# cannot touch the live download endpoint.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write # create the GitHub Release
  id-token: write # build provenance attestation (OIDC, GitHub only)
  attestations: write # write the attestation

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux is built on 22.04 (glibc 2.35) so the binaries run on
          # older distros too; a binary built on a newer glibc would
          # fail with "GLIBC_2.xx not found" on Ubuntu 22.04 / Debian 12.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          # Native ARM runner. pyke's prebuilt aarch64 ONNX Runtime is
          # compiled against glibc 2.38+, which will not link on the
          # 2.35 runner (undefined __isoc23_strtol). Instead we link
          # Microsoft's official aarch64 ONNX Runtime (built on an old
          # manylinux, glibc ~2.27) via ORT_LIB_PATH and ship its
          # libonnxruntime.so next to the binary. See the "Fetch ONNX
          # Runtime" step below.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            onnx_so: "1"
          # Intel macOS (x86_64-apple-darwin / macos-13) is intentionally
          # not built: GitHub's free macos-13 runners are effectively
          # unavailable (jobs sit queued indefinitely). Apple Silicon
          # covers current Macs; revisit Intel if runner availability
          # improves.
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Fetch ONNX Runtime (aarch64-linux)
        if: matrix.onnx_so
        shell: bash
        run: |
          set -euo pipefail
          # ort 2.0 targets ONNX Runtime 1.24.x. Microsoft's official
          # aarch64 build is compiled on an old manylinux (glibc ~2.27),
          # so it links and runs on every modern ARM distro, unlike
          # pyke's prebuilt (glibc 2.38+).
          ort_ver="1.24.2"
          url="https://github.com/microsoft/onnxruntime/releases/download/v${ort_ver}/onnxruntime-linux-aarch64-${ort_ver}.tgz"
          mkdir -p "$RUNNER_TEMP/ort"
          curl -fsSL "$url" -o "$RUNNER_TEMP/ort.tgz"
          tar xzf "$RUNNER_TEMP/ort.tgz" -C "$RUNNER_TEMP/ort" --strip-components=1
          lib="$RUNNER_TEMP/ort/lib"
          test -f "$lib/libonnxruntime.so" || { echo "::error::libonnxruntime.so not found"; exit 1; }
          # ort-sys links against the build pointed to by ORT_LIB_PATH
          # instead of downloading pyke's binary. ORT_PREFER_DYNAMIC_LINK
          # makes it link the .so (not expect static .a files).
          echo "ORT_LIB_PATH=$lib" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          # Resolve the .so from the binary's own directory at runtime.
          echo "RUSTFLAGS=-C link-args=-Wl,-rpath,\$ORIGIN" >> "$GITHUB_ENV"
          echo "ORT_SO_DIR=$lib" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --profile dist --target ${{ matrix.target }} --package memryzed-cli

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          bin="memryzed"
          [[ "${{ matrix.target }}" == *windows* ]] && bin="memryzed.exe"
          staging="memryzed-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/dist/$bin" "$staging/"
          cp README.md LICENSE NOTICE "$staging/"
          # On aarch64-linux the binary dynamically links Microsoft's
          # libonnxruntime.so; ship it alongside the binary so the
          # $ORIGIN rpath resolves it at runtime. Preserve the symlink
          # chain (libonnxruntime.so -> .so.1 -> .so.1.24.2) with -P so
          # the archive carries one real file plus two small symlinks,
          # not three ~18 MB copies.
          if [[ -n "${ORT_SO_DIR:-}" ]]; then
            cp -P "$ORT_SO_DIR"/libonnxruntime.so* "$staging/"
          fi
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "$staging.zip" "$staging" >/dev/null
            certutil -hashfile "$staging.zip" SHA256 | sed -n '2p' | tr -d ' \r' > "$staging.zip.sha256.tmp"
            printf '%s  %s\n' "$(cat "$staging.zip.sha256.tmp")" "$staging.zip" > "$staging.zip.sha256"
            rm "$staging.zip.sha256.tmp"
            echo "archive=$staging.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "$staging.tar.gz" "$staging"
            shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"
            echo "archive=$staging.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke test the built binary
        shell: bash
        run: |
          set -euo pipefail
          bin="memryzed"
          [[ "${{ matrix.target }}" == *windows* ]] && bin="memryzed.exe"
          path="memryzed-${{ matrix.target }}/$bin"
          # Only the runner's own architecture can be executed here;
          # cross-arch (aarch64 built on x86 runners) is skipped. With
          # the native-ARM runner above, every target runs on its own
          # arch, so this verifies the binary actually starts and that
          # the embedder/ONNX stack links.
          chmod +x "$path" || true
          "$path" --version

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "memryzed-${{ matrix.target }}.*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memryzed-${{ matrix.target }}
          path: |
            memryzed-*.tar.gz*
            memryzed-*.zip*

  release:
    name: Publish GitHub Release
    needs: build
    # Publish whatever artifacts the matrix produced, even if one target
    # fails to build. A single failing leg (e.g. a platform with a
    # toolchain regression) must not block shipping the others. The
    # download step below only fetches artifacts that were actually
    # uploaded.
    if: ${{ always() && needs.build.result != 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - name: Fail if no artifacts were produced
        run: |
          set -euo pipefail
          count=$(find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) | wc -l)
          echo "artifact archives found: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::no build artifacts were produced; nothing to release"
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Built and attested by GitHub Actions from the tagged commit.

            These artifacts are promoted to https://memryzed.com/releases/
            manually from a trusted machine; see
            docs/development/release-process.md. Verify any download
            against its `.sha256` file.
